kind = "web"
previewPath = "/"
title = "Studio Photography Manager"
version = "1.0.0"
id = "artifacts/studio-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25319
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/studio-app run dev"

[services.env]
PORT = "25319"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/studio-app", "run", "build"]
publicDir = "artifacts/studio-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
